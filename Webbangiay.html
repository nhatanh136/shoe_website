<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Website Shoes</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial;
        }

        body {
            background: #f5f5f5;
        }

        /* HEADER */
        .header {
            background: #ddd;
            border: 3px solid black;
            padding: 15px;
        }

        .menu {
            display: flex;
            gap: 15px;
        }

        /* BANNER */
        .banner {
            width: 90%;
            height: 200px;
            margin: 40px auto;
            border: 3px solid black;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* PRODUCT */
        .product-container {
            width: 90%;
            margin: auto;
            display: flex;
            justify-content: space-between;
            margin-bottom: 60px;
        }

        .product {
            width: 22%;
            border: 3px solid black;
            background: white;
            text-align: center;
            padding: 10px;
        }

        .product img {
            width: 100%;
            height: 150px;
            object-fit: cover;
        }

        .product h4 {
            margin-top: 10px;
        }

        /* FOOTER */
        .footer {
            height: 80px;
            border: 3px solid black;
            background: #ddd;
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body>

    <!-- HEADER -->
    <div class="header">
        <div class="menu">
            <b>LOGO</b>
            <span>| Home</span>
            <span>| Products</span>
            <span>| Men</span>
            <span>| Women</span>
            <span>| Contact</span>
        </div>
    </div>

    <!-- BANNER -->
    <div class="banner">
        <h3>HOME BANNER</h3>
    </div>

    <!-- PRODUCTS -->
    <div class="product-container">

        <div class="product">
            <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff" alt="shoe">
            <h4>Nike Air</h4>
        </div>

        <div class="product">
            <img src="https://images.unsplash.com/photo-1525966222134-fcfa99b8ae77" alt="shoe">
            <h4>Adidas</h4>
        </div>

        <div class="product">
            <img src="https://images.unsplash.com/photo-1519741497674-611481863552" alt="shoe">
            <h4>Puma</h4>
        </div>

        <div class="product">
            <img src="https://images.unsplash.com/photo-1600185365483-26d7a4cc7519" alt="shoe">
            <h4>Jordan</h4>
        </div>

    </div>

    <!-- FOOTER -->
    <div class="footer">
        Footer
    </div>

</body>
</html>
